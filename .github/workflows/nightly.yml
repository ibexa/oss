name: Nightly browser tests
on:
    schedule:
        # Run tests every night
        - cron: "45 21 * * *"
    workflow_dispatch: ~

jobs:
    nightly:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            max-parallel: 1
            matrix:
                repository:
                    - oss
                    - headless
                    - experience
                    - commerce
                branch:
                    - "3.3"
                    - "4.6"
                    - master
                include:
                    - repository: content
                      branch: "3.3"
                exclude:
                    - repository: headless
                      branch: "3.3"
        steps:
            - uses: actions/create-github-app-token@v2
              id: generate_token
              with:
                  app-id: ${{ secrets.AUTOMATION_CLIENT_ID }}
                  private-key: ${{ secrets.AUTOMATION_CLIENT_SECRET }}
                  owner: ${{ github.repository_owner }}
            - uses: octokit/request-action@v2.x
              name: Trigger workflow
              with:
                  route: POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches
                  owner: ${{ github.repository_owner }}
                  repo: ${{ matrix.repository }}
                  workflow_id: browser-tests.yml
                  ref: ${{ matrix.branch }}
                  inputs: |
                      { "send-success-notification": "false" }
              env:
                  GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
